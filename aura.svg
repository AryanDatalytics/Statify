<svg width="300" height="100" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D00" />
      <stop offset="100%" style="stop-color:#FFEA00" />
    </linearGradient>
  </defs>

  <rect width="300" height="100" rx="15" fill="#0A0A0A" stroke="#333" stroke-width="1"/>
  
  <circle cx="50" cy="50" r="30" fill="#FF3D00" fill-opacity="0.1" filter="blur(20px)"/>

  <g transform="translate(20, 15)">
    <circle cx="35" cy="35" r="32" stroke="url(#fireGrad)" stroke-width="2" stroke-dasharray="4 2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0 35 35" to="360 35 35" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <path d="M35 15C35 15 25 25 25 38C25 43.5 29.5 48 35 48C40.5 48 45 43.5 45 38C45 25 35 15 35 15Z" fill="url(#fireGrad)" filter="url(#neonGlow)">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
    </path>
    
    <text x="35" y="42" fill="white" font-family="Arial Black" font-size="16" font-weight="900" text-anchor="middle" filter="url(#neonGlow)">19</text>
  </g>

  <text x="100" y="45" fill="white" font-family="Segoe UI, Arial" font-size="14" font-weight="800" style="letter-spacing:1px;">STREAK STATUS</text>
  <text x="100" y="70" fill="#888" font-family="Segoe UI, Arial" font-size="11" font-weight="bold">ACTIVE CONTRIBUTOR</text>
  
  <circle cx="270" cy="20" r="4" fill="#00FF00" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <text x="235" y="24" fill="#00FF00" font-family="Arial" font-size="9" font-weight="bold">LIVE</text>

</svg>