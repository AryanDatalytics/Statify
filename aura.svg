<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="95" fill="#0D0D0D" stroke="url(#goldGrad)" stroke-width="4" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>

  <path id="curve" d="M 40,100 A 60,60 0 0,1 160,100" fill="transparent"/>
  <text width="200" style="font-family:Arial; font-size:12px; font-weight:bold; fill:url(#goldGrad); text-transform:uppercase;">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">Contribution Streak</textPath>
  </text>

  <g transform="translate(60, 55) scale(3.5)">
    <path d="M12 22C16.4 22 20 18.4 20 14C20 8 12 2 12 2C12 2 4 8 4 14C4 18.4 7.6 22 12 22Z" fill="#FF4500">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M12 18C14.2 18 16 16.2 16 14C16 11 12 8 12 8C12 8 8 11 8 14C8 16.2 9.8 18 12 18Z" fill="#FFA500" />
  </g>

  <text x="100" y="130" fill="white" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" text-anchor="middle" filter="url(#glow)" style="paint-order: stroke; stroke: #000; stroke-width: 2px;">0</text>
  
  <text x="100" y="165" fill="#FFD700" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" style="letter-spacing:2px;">DAYS</text>

</svg>